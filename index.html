<script>
let DIMENSIONS = [];
let teas = [];
let notes = [];
let currentPhotoTeaId = null;
let noteTimers = {};
let currentCardIndex = 0;
let editingNoteId = null;

// ── API 工具函数 ─────────────────────────────────────────

async function api(path, opts = {}) {
  const res = await fetch(path, opts);
  if (!res.ok && res.status !== 204) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.error || '请求失败');
  }
  if (res.status === 204) return null;
  return res.json();
}

async function loadTeas() {
  [DIMENSIONS, teas] = await Promise.all([
    api('/api/dimensions'),
    api('/api/teas'),
  ]);

  // 加载已保存的报告
  const reportData = await api('/api/report');
  if (reportData && reportData.content) {
    analysisResult = reportData.content;
    reportMeta = reportData;
  } else {
    analysisResult = '';
    reportMeta = null;
  }

  notes = await api('/api/notes');

  render();
  renderReport();
}

// ── 茶样操作 ─────────────────────────────────────────────

function addTea() {
  const input = document.getElementById('teaNameInput');
  const name = input.value.trim();
  if (!name) return;
  input.value = '';
  editingTeaId = null;
  teaEditorMode = 'add';
  document.getElementById('teaEditDialogTitle').textContent = '➕ 添加茶样';
  document.getElementById('editTeaName').value = name;
  document.getElementById('editTeaVariety').value = '';
  document.getElementById('editTeaGrade').value = '';
  document.getElementById('editTeaOrigin').value = '';
  document.getElementById('editTeaProducer').value = '';
  document.getElementById('editTeaPrice').value = '';
  document.getElementById('editTeaBrand').value = '';
  document.getElementById('editTeaWeight').value = '';
  const modal = document.getElementById('teaEditModal');
  modal.style.display = 'flex';
  requestAnimationFrame(() => modal.classList.add('show'));
}

let pendingDeleteId = null;

function removeTea(id) {
  const tea = teas.find(t => t.id === id);
  if (!tea) return;
  pendingDeleteId = id;
  document.getElementById('deleteTeaName').textContent = tea.name;
  const modal = document.getElementById('deleteModal');
  modal.style.display = 'flex';
  requestAnimationFrame(() => modal.classList.add('show'));
}

function closeDeleteModal() {
  const modal = document.getElementById('deleteModal');
  modal.classList.remove('show');
  setTimeout(() => modal.style.display = 'none', 200);
  pendingDeleteId = null;
}

async function confirmDelete() {
  if (pendingDeleteId === null) return;
  const id = pendingDeleteId;
  closeDeleteModal();
  await api(`/api/teas/${id}`, { method: 'DELETE' });
  // 标记报告过期
  if (reportMeta) reportMeta.stale = true;
  await loadTeas();
}

let editingTeaId = null;
let teaEditorMode = 'edit'; // 'add' | 'edit'

function showTeaEditor(id) {
  const tea = teas.find(t => t.id === id);
  if (!tea) return;
  editingTeaId = id;
  teaEditorMode = 'edit';
  document.getElementById('teaEditDialogTitle').textContent = '✎ 编辑茶样信息';
  document.getElementById('editTeaName').value = tea.name || '';
  document.getElementById('editTeaVariety').value = tea.variety || '';
  document.getElementById('editTeaGrade').value = tea.grade || '';
  document.getElementById('editTeaOrigin').value = tea.origin || '';
  document.getElementById('editTeaProducer').value = tea.producer || '';
  document.getElementById('editTeaPrice').value = tea.price || '';
  document.getElementById('editTeaBrand').value = tea.brand || '';
  document.getElementById('editTeaWeight').value = tea.weight || '';
  const modal = document.getElementById('teaEditModal');
  modal.style.display = 'flex';
  requestAnimationFrame(() => modal.classList.add('show'));
}

function closeTeaEditor() {
  const modal = document.getElementById('teaEditModal');
  modal.classList.remove('show');
  setTimeout(() => modal.style.display = 'none', 200);
  editingTeaId = null;
}

async function saveTeaEdit() {
  const body = {
    name: document.getElementById('editTeaName').value.trim(),
    variety: document.getElementById('editTeaVariety').value.trim(),
    grade: document.getElementById('editTeaGrade').value.trim(),
    origin: document.getElementById('editTeaOrigin').value.trim(),
    producer: document.getElementById('editTeaProducer').value.trim(),
    price: document.getElementById('editTeaPrice').value.trim(),
    brand: document.getElementById('editTeaBrand').value.trim(),
    weight: document.getElementById('editTeaWeight').value.trim(),
  };
  if (!body.name) { showToast('茶名不能为空'); return; }
  try {
    if (teaEditorMode === 'add') {
      await api('/api/teas', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
    } else {
      if (editingTeaId === null) return;
      await api(`/api/teas/${editingTeaId}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
    }
    closeTeaEditor();
    if (reportMeta) reportMeta.stale = true;
    await loadTeas();
    if (teaEditorMode === 'add' || teaEditorMode === 'add') {
      currentCardIndex = teas.length - 1;
    }
    render();
    renderReport();
  } catch (e) {
    showToast(e.message);
  }
}

async function setScore(id, key, val) {
  const tea = teas.find(t => t.id === id);
  if (!tea) return;
  const newVal = tea.scores[key] === val ? 0 : val;
  tea.scores[key] = newVal;
  // 标记报告为过期
  if (reportMeta) reportMeta.stale = true;
  render();
  renderReport();
  await api(`/api/teas/${id}`, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ scores: { [key]: newVal } }),
  });
}

function setNote(id, val) {
  const tea = teas.find(t => t.id === id);
  if (tea) tea.note = val;
  clearTimeout(noteTimers[id]);
  noteTimers[id] = setTimeout(async () => {
    await api(`/api/teas/${id}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ note: val }),
    });
  }, 500);
}

function getTotal(tea) {
  return DIMENSIONS.reduce((s, d) => s + (tea.scores[d.key] || 0), 0);
}

function photoUrl(tea) {
  return tea.photo ? `/data/photos/${tea.photo}` : '';
}

function teaMetaHtml(t) {
  const labels = { variety: '品种', grade: '等级', origin: '产地', producer: '企业', price: '价格', brand: '品牌', weight: '净重' };
  let html = '';
  for (const [key, label] of Object.entries(labels)) {
    const val = (t[key] || '').trim();
    if (val) html += `<span class="tea-meta-pill"><b>${label}：</b>${val}</span>`;
  }
  return html;
}

// ── 图片上传 ─────────────────────────────────────────────

function triggerPhoto(id) {
  currentPhotoTeaId = id;
  const input = document.getElementById('photoInput');
  input.value = '';
  input.click();
}

async function handlePhoto(event) {
  const file = event.target.files[0];
  if (!file || !currentPhotoTeaId) return;

  const form = new FormData();
  form.append('photo', file);

  try {
    const result = await api(`/api/teas/${currentPhotoTeaId}/photo`, {
      method: 'POST',
      body: form,
    });
    const tea = teas.find(t => t.id === currentPhotoTeaId);
    if (tea) tea.photo = result.photo;
    render();
  } catch (e) {
    showToast('图片上传失败');
  }
}

// ── Tab 切换 ─────────────────────────────────────────────

function renderReport() {
  const resultEl = document.getElementById('aiResult');
  if (analysisResult) {
    resultEl.style.display = 'block';
    resultEl.innerHTML = renderAiResult(analysisResult, reportMeta);
  } else {
    resultEl.style.display = 'none';
    resultEl.innerHTML = '';
  }
}

function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach((btn, i) => {
    btn.classList.toggle('active', ['score','table','rank'][i] === tab);
  });
  document.getElementById('panelScore').style.display = tab === 'score' ? '' : 'none';
  document.getElementById('panelTable').style.display = tab === 'table' ? '' : 'none';
  document.getElementById('panelRank').style.display = tab === 'rank' ? '' : 'none';
  if (tab === 'table') renderTable();
  if (tab === 'rank') { renderRank(); renderReport(); }
}

// ── 轮播 ─────────────────────────────────────────────────

function goToCard(idx) {
  if (idx < 0 || idx >= teas.length) return;
  currentCardIndex = idx;
  render();
}

// ── 渲染 ─────────────────────────────────────────────────

function render() {
  const tagsEl = document.getElementById('teaTags');
  tagsEl.innerHTML = teas.map(t => {
    const url = photoUrl(t);
    const imgPart = url
      ? `<img src="${url}" alt="${t.name}">`
      : `<span class="tag-placeholder">🍃</span>`;
    return `<span class="tea-tag">${imgPart} ${t.name} <button class="btn-danger" onclick="removeTea(${t.id})">✕</button></span>`;
  }).join('');

  const cardsEl = document.getElementById('teaCards');
  if (teas.length === 0) {
    currentCardIndex = 0;
    cardsEl.innerHTML = '<div class="empty-hint">👆 先在上方添加你要品鉴的茶样名称</div>';
    return;
  }

  if (currentCardIndex >= teas.length) currentCardIndex = teas.length - 1;

  const t = teas[currentCardIndex];

  const noteEl = document.getElementById('note-' + t.id);
  const noteVal = noteEl ? noteEl.value : t.note;

  const dots = teas.map((tea, i) =>
    `<button class="carousel-dot ${i === currentCardIndex ? 'active' : ''}" onclick="goToCard(${i})">${tea.name}</button>`
  ).join('');

  const nav = `<div class="carousel-nav">
    <button class="carousel-btn" onclick="goToCard(${currentCardIndex - 1})" ${currentCardIndex === 0 ? 'disabled' : ''}>&#8249;</button>
    <div class="carousel-dots">${dots}</div>
    <button class="carousel-btn" onclick="goToCard(${currentCardIndex + 1})" ${currentCardIndex === teas.length - 1 ? 'disabled' : ''}>&#8250;</button>
  </div>`;

  const rows = DIMENSIONS.map(d => {
    const stars = [1,2,3,4,5].map(v =>
      `<div class="star ${t.scores[d.key] >= v ? 'active' : ''}" onclick="setScore(${t.id},'${d.key}',${v})">${v}</div>`
    ).join('');
    return `<div class="rating-row">
      <div>
        <div class="rating-label">${d.name}</div>
        <div class="rating-desc">${d.desc}</div>
      </div>
      <div class="star-group">${stars}</div>
    </div>`;
  }).join('');

  const url = photoUrl(t);
  const photoPart = url
    ? `<img src="${url}" alt="${t.name}"><div class="photo-overlay">更换照片</div><div class="photo-preview"><img src="${url}" alt="${t.name}"></div>`
    : `<div class="photo-hint"><span class="cam-icon">📷</span>拍照/上传</div>`;

  cardsEl.innerHTML = nav + `<div class="tea-card">
    <div class="tea-card-header">
      <div class="tea-card-photo ${url ? 'has-img' : ''}" onclick="triggerPhoto(${t.id})">
        ${photoPart}
      </div>
      <div class="tea-card-info">
        <div class="tea-card-name-row">
          <div class="tea-card-name">🍃 ${t.name}</div>
          <button class="tea-edit-btn" onclick="showTeaEditor(${t.id})" title="编辑茶样信息">✎</button>
        </div>
        <div class="tea-card-meta">${teaMetaHtml(t)}</div>
        <div class="tea-card-score-summary">总分：${getTotal(t)} / ${DIMENSIONS.length * 5}（${currentCardIndex + 1} / ${teas.length}）</div>
      </div>
    </div>
    ${rows}
    <textarea class="note-input" id="note-${t.id}" placeholder="备注口感特点，如：花香明显、有奶油感…" oninput="setNote(${t.id}, this.value)">${noteVal}</textarea>
  </div>`;
}

function showNamePreview(e, el) {
  const url = el.dataset.photo;
  if (!url) return;
  let preview = document.getElementById('globalNamePreview');
  if (!preview) {
    preview = document.createElement('div');
    preview.id = 'globalNamePreview';
    preview.style.cssText = 'position:fixed;width:180px;height:180px;border-radius:10px;overflow:hidden;box-shadow:0 6px 24px rgba(92,58,33,0.25);border:3px solid #fff;z-index:9999;background:#fff;pointer-events:none;display:none;';
    document.body.appendChild(preview);
  }
  preview.innerHTML = `<img src="${url}" style="width:100%;height:100%;object-fit:cover;">`;
  const rect = el.getBoundingClientRect();
  preview.style.display = 'block';
  preview.style.top = (rect.bottom + 4) + 'px';
  preview.style.left = Math.max(4, rect.left + rect.width / 2 - 90) + 'px';
}
function hideNamePreview(el) {
  const preview = document.getElementById('globalNamePreview');
  if (preview) preview.style.display = 'none';
}

function renderTable() {
  const wrap = document.getElementById('tableWrap');
  if (teas.length === 0) {
    wrap.innerHTML = '<div class="empty-hint">还没有茶样，请先添加并打分</div>';
    return;
  }
  const maxScores = {};
  DIMENSIONS.forEach(d => {
    maxScores[d.key] = Math.max(...teas.map(t => t.scores[d.key]));
  });
  const maxTotal = Math.max(...teas.map(t => getTotal(t)));

  const metaFields = [
    { key: 'variety', label: '品种' },
    { key: 'grade', label: '等级' },
    { key: 'origin', label: '产地' },
    { key: 'producer', label: '生产企业' },
    { key: 'price', label: '价格' },
    { key: 'brand', label: '品牌' },
    { key: 'weight', label: '净重' },
  ];

  function parseNum(s) {
    const m = (s || '').match(/[\d.]+/);
    return m ? parseFloat(m[0]) : NaN;
  }
  function addUnit(val, unit) {
    if (!val || val === '-') return val;
    return /^[\d.]+$/.test(val.trim()) ? val.trim() + unit : val;
  }

  const priceNums = teas.map(t => parseNum(t.price));
  const weightNums = teas.map(t => parseNum(t.weight));
  const unitPrices = teas.map((t, i) => {
    const p = priceNums[i], w = weightNums[i];
    return (!isNaN(p) && !isNaN(w) && w > 0) ? p / w : NaN;
  });
  const validPrices = unitPrices.filter(v => !isNaN(v));
  const hasUnitPrice = validPrices.length >= 2;

  let html = '<table><thead><tr><th>维度</th>';
  teas.forEach(t => {
    const url = photoUrl(t);
    const previewHtml = url
      ? `<div class="th-name-hover" data-photo="${url}" onmouseenter="showNamePreview(event,this)" onmouseleave="hideNamePreview(this)">${t.name}</div>`
      : t.name;
    html += `<th>${previewHtml}</th>`;
  });
  html += '</tr></thead><tbody>';

  metaFields.forEach(f => {
    const isLeft = f.key === 'producer';
    const unit = f.key === 'price' ? '元' : f.key === 'weight' ? 'g' : '';
    html += `<tr class="info-row"><td>${f.label}</td>`;
    teas.forEach(t => {
      const raw = (t[f.key] || '').trim();
      const display = unit ? addUnit(raw || '-', unit) : (raw || '-');
      html += `<td${isLeft ? ' class="left-align"' : ''}>${display}</td>`;
    });
    html += '</tr>';
  });

  if (hasUnitPrice) {
    const minP = Math.min(...validPrices);
    const maxP = Math.max(...validPrices);
    const range = maxP - minP || 1;
    html += '<tr class="info-row"><td>单价</td>';
    unitPrices.forEach(up => {
      if (isNaN(up)) {
        html += '<td>-</td>';
      } else {
        const ratio = (up - minP) / range;
        const r = Math.round(180 + 75 * ratio);
        const g = Math.round(200 - 70 * ratio);
        const b = Math.round(120 - 60 * ratio);
        const bg = `rgba(${r},${g},${b},0.18)`;
        html += `<td style="background:${bg} !important;font-weight:600">${up.toFixed(1)}元/克</td>`;
      }
    });
    html += '</tr>';
  }

  DIMENSIONS.forEach((d, i) => {
    html += `<tr${i === 0 ? ' class="score-sep"' : ''}><td>${d.name}</td>`;
    teas.forEach(t => {
      const v = t.scores[d.key];
      const isBest = v > 0 && v === maxScores[d.key] && teas.filter(x => x.scores[d.key] === v).length < teas.length;
      html += `<td class="score-cell ${isBest ? 'best-score' : ''}">${v || '-'}</td>`;
    });
    html += '</tr>';
  });

  html += `<tr class="total-row"><td>总分</td>`;
  teas.forEach(t => {
    const tot = getTotal(t);
    const isBest = tot > 0 && tot === maxTotal && teas.filter(x => getTotal(x) === tot).length < teas.length;
    html += `<td class="score-cell ${isBest ? 'best-score' : ''}">${tot}</td>`;
  });
  html += '</tr>';

  const sorted = [...teas].sort((a, b) => getTotal(b) - getTotal(a));
  html += `<tr class="rank-row"><td>🏆 排名</td>`;
  teas.forEach(t => {
    const rank = sorted.findIndex(s => s.id === t.id) + 1;
    const emoji = rank === 1 ? '🥇' : rank === 2 ? '🥈' : rank === 3 ? '🥉' : '';
    html += `<td>${emoji} 第${rank}名</td>`;
  });
  html += '</tr>';

  html += `<tr><td>备注</td>`;
  teas.forEach(t => {
    html += `<td style="font-size:0.78rem;text-align:left;color:#6d5a20;max-width:120px;word-break:break-all;">${t.note || '-'}</td>`;
  });
  html += '</tr>';

  html += '</tbody></table>';
  wrap.innerHTML = html;
}

function renderRank() {
  const wrap = document.getElementById('rankWrap');
  if (teas.length === 0) {
    wrap.innerHTML = '<div class="empty-hint">还没有茶样，请先添加并打分</div>';
    return;
  }
  const maxPossible = DIMENSIONS.length * 5;
  const sorted = [...teas].sort((a, b) => getTotal(b) - getTotal(a));

  const classes = ['gold','silver','bronze'];
  let html = '<div class="ranking">';
  sorted.forEach((t, i) => {
    const tot = getTotal(t);
    const pct = (tot / maxPossible * 100).toFixed(0);
    const cls = i < 3 ? classes[i] : '';
    const url = photoUrl(t);
    const photoHtml = url
      ? `<img class="rank-photo" src="${url}" alt="${t.name}">`
      : '';
    html += `<div class="rank-item ${cls}">
      <div class="rank-num">${i + 1}</div>
      ${photoHtml}
      <div class="rank-info">
        <div class="rank-tea-name">${t.name}</div>
        <div class="tea-card-meta">${teaMetaHtml(t)}</div>
        <div class="rank-tea-score">总分 ${tot} / ${maxPossible}（${pct}%）</div>
        <div class="rank-bar-bg"><div class="rank-bar" style="width:${pct}%"></div></div>
      </div>
    </div>`;
  });
  html += '</div>';

  if (sorted.length > 0 && getTotal(sorted[0]) > 0) {
    const winner = sorted[0];
    const url = photoUrl(winner);
    const winnerPhoto = url
      ? `<img src="${url}" alt="${winner.name}">`
      : '';
    html += `<div class="recommend-box">
      ${winnerPhoto}
      🏆 推荐购买：<b style="color:#d4380d;font-size:1.1rem;">${winner.name}</b>
    </div>`;
  }

  wrap.innerHTML = html;
}

// ── AI 分析 ──────────────────────────────────────────────

const SECTION_ICONS = { '逐款点评': '🍃', '横向对比': '⚖️', '选购建议': '🛒', '冲泡建议': '☕' };
let analysisResult = '';  // 品鉴分析报告内容
let reportMeta = null;    // 报告元信息 { created_at, stale }
let chatHistory = [];     // 追问对话历史

function renderAiResult(rawMd, meta) {
  let html = '';

  // 报告头部
  if (meta) {
    const scoredTeas = teas.filter(t => Object.values(t.scores).some(v => v > 0));
    const maxPossible = DIMENSIONS.length * 5;
    const best = scoredTeas.length > 0 ? scoredTeas.reduce((a, b) => getTotal(a) > getTotal(b) ? a : b) : null;
    const bestScore = best ? getTotal(best) : 0;
    html += `<div class="ai-report-header">
      <h3>🍵 AI 品鉴分析报告</h3>
      <div class="ai-report-meta">
        <span>📅 ${meta.created_at || '刚刚生成'}</span>
        <span>🍃 ${scoredTeas.length} 款茶样</span>
        ${best ? `<span>🏆 最高分 ${bestScore}/${maxPossible}（${best.name}）</span>` : ''}
      </div>
    </div>`;
  }

  // 评分速览
  const scoredTeas = teas.filter(t => Object.values(t.scores).some(v => v > 0));
  if (scoredTeas.length > 0) {
    const maxPossible = DIMENSIONS.length * 5;
    html += `<div class="ai-score-overview">
      <div class="ai-score-overview-title">📊 评分速览</div>`;
    scoredTeas.forEach(t => {
      const total = getTotal(t);
      const pct = (total / maxPossible * 100).toFixed(0);
      html += `<div class="ai-score-item">
        <div class="ai-score-item-name">${t.name}</div>
        <div class="ai-score-item-bars">`;
      DIMENSIONS.forEach(d => {
        const v = t.scores[d.key] || 0;
        const fillPct = (v / 5 * 100).toFixed(0);
        html += `<div style="flex:1;text-align:center;">
          <div class="ai-score-dim-bar">
            <div class="ai-score-dim-fill" style="width:${fillPct}%"></div>
          </div>
          <div class="ai-score-dim-label">${d.name}</div>
        </div>`;
      });
      html += `</div>
        <div class="ai-score-item-total">${total}/${maxPossible}</div>
      </div>`;
    });
    html += `</div>`;
  }

  // 过期提示
  if (meta && meta.stale) {
    html += `<div class="ai-report-stale-hint">
      ⚠️ 评分数据已变更，报告可能过时
      <button onclick="aiAnalyze()">重新分析</button>
    </div>`;
  }

  // 报告内容
  const sections = rawMd.split(/^## /m).filter(Boolean);
  if (sections.length <= 1) {
    html += `<div class="ai-card"><div class="ai-card-title">📋 分析结果</div><div class="ai-card-body">${marked.parse(rawMd)}</div></div>`;
  } else {
    html += sections.map(sec => {
      const nlIdx = sec.indexOf('\n');
      const title = nlIdx > -1 ? sec.substring(0, nlIdx).trim() : sec.trim();
      const body = nlIdx > -1 ? sec.substring(nlIdx + 1).trim() : '';
      const icon = Object.entries(SECTION_ICONS).find(([k]) => title.includes(k))?.[1] || '📋';
      return `<div class="ai-card">
        <div class="ai-card-title">${icon} ${title}</div>
        <div class="ai-card-body">${marked.parse(body)}</div>
      </div>`;
    }).join('');
  }

  // 操作按钮
  html += `<div class="ai-report-actions">
    <button class="ai-report-action-btn" onclick="aiAnalyze()">🔄 重新分析</button>
    <button class="ai-report-action-btn" onclick="copyReport()">📋 复制文本</button>
    <button class="ai-report-action-btn" onclick="exportPdf()">📄 导出 PDF</button>
  </div>`;

  return html;
}

function copyReport() {
  if (!analysisResult) return;
  navigator.clipboard.writeText(analysisResult).then(() => {
    showToast('报告已复制到剪贴板');
  }).catch(() => {
    showToast('复制失败，请手动选择复制');
  });
}

function buildTeaInfoText() {
  const dims = DIMENSIONS;
  const dimNames = {};
  dims.forEach(d => dimNames[d.key] = d.name);
  const maxTotal = dims.length * 5;

  const scoredTeas = teas.filter(t => Object.values(t.scores).some(v => v > 0));
  if (scoredTeas.length === 0) return '';

  let teaInfo = '';
  for (const t of scoredTeas) {
    const scoresStr = dims.map(d => `${dimNames[d.key]}=${t.scores[d.key] || 0}/5`).join('、');
    const total = dims.reduce((s, d) => s + (t.scores[d.key] || 0), 0);
    teaInfo += `- ${t.name}：${scoresStr}，总分=${total}/${maxTotal}`;
    if (t.note) teaInfo += `，备注：${t.note}`;
    teaInfo += '\n';
  }
  return teaInfo;
}

async function aiAnalyze() {
  const btn = document.getElementById('btnAiAnalyze');
  const resultEl = document.getElementById('aiResult');

  btn.disabled = true;
  btn.textContent = '🤖 分析中…';
  resultEl.style.display = 'block';
  resultEl.innerHTML = '<div class="ai-card"><div class="ai-card-title">🤖 正在分析</div><div class="ai-card-body"><p>AI 品鉴师正在品味你的茶样数据<span class="ai-cursor"></span></p></div></div>';

  let fullText = '';
  try {
    const res = await fetch('/api/ai/analyze', { method: 'POST' });

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error || '请求失败');
    }

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop();

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const data = line.slice(6).trim();
        if (data === '[DONE]') break;
        try {
          const parsed = JSON.parse(data);
          if (parsed.content) {
            fullText += parsed.content;
            resultEl.innerHTML = renderAiResult(fullText, { created_at: '生成中…', stale: false }) + '<span class="ai-cursor"></span>';
          }
        } catch {}
      }
    }

    // 从后端获取最新的报告元信息
    const reportData = await api('/api/report');
    reportMeta = reportData || { created_at: '刚刚', stale: false };
    analysisResult = fullText;
    resultEl.innerHTML = renderAiResult(fullText, reportMeta);
    chatHistory = [];  // 重置对话历史
  } catch (e) {
    resultEl.innerHTML = `<div class="ai-card">
      <div class="ai-card-title" style="background:linear-gradient(135deg,#d4380d,#e87040);">⚠️ 分析失败</div>
      <div class="ai-card-body"><p style="color:#d4380d;">${e.message}</p></div>
    </div>`;
  } finally {
    btn.disabled = false;
    btn.textContent = '🤖 AI 品鉴分析';
  }
}

function appendChatMessage(role, content, isStreaming = false) {
  const body = document.getElementById('aiChatBody');
  const empty = document.getElementById('aiChatEmpty');
  if (empty) empty.style.display = 'none';

  const avatar = role === 'user' ? '👤' : '🤖';
  const hint = (role === 'assistant' && !isStreaming) ? '<div class="collect-hint">💡 选中文字可收藏到笔记</div>' : '';
  const msgHtml = `<div class="chat-msg ${role}">
    <div class="chat-avatar">${avatar}</div>
    <div class="chat-bubble">${role === 'user' ? escapeHtml(content) : marked.parse(content)}${isStreaming ? '<span class="ai-cursor"></span>' : ''}${hint}</div>
  </div>`;

  body.insertAdjacentHTML('beforeend', msgHtml);
  scrollToBottom();
}

function updateLastAssistantMessage(content) {
  const body = document.getElementById('aiChatBody');

    lastAssistant.innerHTML = marked.parse(content) + '<span class="ai-cursor"></span>';

function escapeHtml(text) {
  const div = document.createElement('div');

function initChatHistory() {

  const teaInfo = buildTeaInfoText();

async function sendChat() {
  const input = document.getElementById('aiChatInput');
  const sendBtn = document.getElementById('aiChatSend');
  const message = input.value.trim();
  if (!message || sendBtn.disabled) return;

  input.value = '';
  sendBtn.disabled = true;
  input.disabled = true;

  // 首次对话时初始化消息历史
  initChatHistory();

  // 添加用户消息
  chatHistory.push({ role: 'user', content: message });
  appendChatMessage('user', message);

  let fullText = '';

  // 立即显示"正在思考"占位
  const thinkingHtml = `<div class="chat-msg assistant thinking-placeholder">
    <div class="chat-avatar">🤖</div>
    <div class="chat-bubble">
      <div class="ai-thinking-dots"><span></span><span></span><span></span></div>
    </div>
  </div>`;
  const chatBody = document.getElementById('aiChatBody');
  chatBody.insertAdjacentHTML('beforeend', thinkingHtml);
  scrollToBottom();

  try {
    const res = await fetch('/api/ai/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: chatHistory })
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error || '请求失败');
    }

    // 移除思考占位，显示流式内容气泡
    const thinkingEl = chatBody.querySelector('.thinking-placeholder');
    if (thinkingEl) thinkingEl.remove();
    appendChatMessage('assistant', '', true);

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop();

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const data = line.slice(6).trim();
        if (data === '[DONE]') break;
        try {
          const parsed = JSON.parse(data);
          if (parsed.content) {
            fullText += parsed.content;
            updateLastAssistantMessage(fullText);
          }
        } catch {}
      }
    }

    // 完成，保存助手回复
    chatHistory.push({ role: 'assistant', content: fullText });
    // 移除光标，渲染最终内容
    const lastBubble = document.querySelector('#aiChatBody .chat-msg.assistant:last-child .chat-bubble');
    if (lastBubble) {
      lastBubble.innerHTML = marked.parse(fullText) + '<div class="collect-hint">💡 选中文字可收藏到笔记</div>';
    }
  } catch (e) {
    // 移除可能残留的思考占位
    const thinkingEl = chatBody.querySelector('.thinking-placeholder');
    if (thinkingEl) thinkingEl.remove();
    chatHistory.push({ role: 'assistant', content: `抱歉，发生了错误：${e.message}` });
    appendChatMessage('assistant', `抱歉，发生了错误：${e.message}`);
  } finally {
    sendBtn.disabled = false;
    input.disabled = false;
    input.focus();
  }
}

function initResizeHandle() {
  const handle = document.getElementById('aiChatResizeHandle');
  const panel = document.getElementById('aiChatPanel');
  let startX, startWidth, isDragging = false;

  handle.addEventListener('mousedown', (e) => {
    isDragging = true;
    startX = e.clientX;
    startWidth = panel.offsetWidth;
    document.body.style.cursor = 'ew-resize';
    document.body.style.userSelect = 'none';
    e.preventDefault();
  });

  document.addEventListener('mousemove', (e) => {
    if (!isDragging) return;
    const deltaX = startX - e.clientX;  // 向左拖拽增加宽度
    const newWidth = Math.max(300, Math.min(window.innerWidth * 0.5, startWidth + deltaX));
    panel.style.width = newWidth + 'px';
  });

  document.addEventListener('mouseup', () => {
    if (isDragging) {
      isDragging = false;
      document.body.style.cursor = '';
      document.body.style.userSelect = '';
    }
  });

  // 触摸支持
  handle.addEventListener('touchstart', (e) => {
    isDragging = true;
    startX = e.touches[0].clientX;
    startWidth = panel.offsetWidth;
    e.preventDefault();
  }, { passive: false });

  document.addEventListener('touchmove', (e) => {
    if (!isDragging) return;
    const deltaX = startX - e.touches[0].clientX;
    const newWidth = Math.max(300, Math.min(window.innerWidth * 0.5, startWidth + deltaX));
    panel.style.width = newWidth + 'px';
  }, { passive: false });

  document.addEventListener('touchend', () => {
    isDragging = false;
  });
}

let activeTagFilter = null;
let editingNoteTags = [];
let notesPage = 1;
let notesPageSize = 10;

function escAttr(s) {
  return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function filterNotes() { notesPage = 1; renderNotes(); }

function getAllTags() {
  const tagSet = new Set();
  notes.forEach(n => (n.tags || []).forEach(t => tagSet.add(t)));
  return [...tagSet].sort();
}

function renderTagFilter() {
  const container = document.getElementById('notesTagFilter');
  if (!container) return;
  const tags = getAllTags();
  if (!tags.length) { container.innerHTML = ''; return; }
  container.innerHTML = tags.map(t =>
    `<span class="tag-filter-pill ${activeTagFilter === t ? 'active' : ''}" data-tag="${escAttr(t)}">${escHtml(t)}</span>`
  ).join('');
}

function toggleTagFilter(tag) {
  activeTagFilter = activeTagFilter === tag ? null : tag;
  notesPage = 1;
  renderNotes();
}

// 标签筛选条点击事件委托
document.addEventListener('click', function(e) {
  const pill = e.target.closest('.tag-filter-pill[data-tag]');
  if (pill) { toggleTagFilter(pill.dataset.tag); return; }
  const noteTag = e.target.closest('.note-tag-pill[data-tag]');
  if (noteTag) { e.stopPropagation(); toggleTagFilter(noteTag.dataset.tag); }
});

function toggleNoteExpand(id) {
  const contentEl = document.querySelector(`.note-content[data-note-id="${id}"]`);
  const btnEl = document.querySelector(`.note-expand-btn[data-note-id="${id}"]`);
  if (!contentEl) return;
  if (contentEl.classList.contains('expanded')) {
    contentEl.classList.remove('expanded');
    if (btnEl) btnEl.textContent = '▼ 展开';
  } else {
    contentEl.classList.add('expanded');
    if (btnEl) btnEl.textContent = '▲ 收起';
  }
}

function renderNotes() {
  const list = document.getElementById('notesList');
  const query = (document.getElementById('notesSearch')?.value || '').trim().toLowerCase();

  let filtered = [...notes];

  // 标签筛选
  if (activeTagFilter) {
    filtered = filtered.filter(n => (n.tags || []).includes(activeTagFilter));
  }

  // 关键字搜索
  if (query) {
    filtered = filtered.filter(n =>
      (n.title || '').toLowerCase().includes(query) ||
      (n.content || '').toLowerCase().includes(query)
    );
  }

  renderTagFilter();

  if (!filtered.length) {
    const reason = notes.length === 0
      ? '还没有笔记，点击上方按钮新增，或在 AI 对话中收藏'
      : '没有匹配的笔记';
    list.innerHTML = `<div class="empty-hint">${reason}</div>`;
    renderNotesPagination(0);
    return;
  }

  const allSorted = [...filtered].reverse();
  const totalPages = Math.ceil(allSorted.length / notesPageSize);
  if (notesPage > totalPages) notesPage = totalPages;
  if (notesPage < 1) notesPage = 1;
  const start = (notesPage - 1) * notesPageSize;
  const display = allSorted.slice(start, start + notesPageSize);

  list.innerHTML = display.map(n => {
    const colorClass = 'color-' + (notes.indexOf(n) % 8);
    const sourceLabel = n.source === 'ai-chat'
      ? '<span class="note-source-tag">🤖 来自AI对话</span>'
      : '<span class="note-source-tag">✍️ 手动记录</span>';
    const titleHtml = n.title ? `<div class="note-card-title">${escHtml(n.title)}</div>` : '';
    const tagsHtml = (n.tags || []).length
      ? `<div class="note-tags">${(n.tags || []).map(t =>
          `<span class="note-tag-pill" data-tag="${escAttr(t)}">${escHtml(t)}</span>`
        ).join('')}</div>`
      : '';
    return `<div class="note-card ${colorClass}">
      ${titleHtml}
      <div class="note-meta">${sourceLabel} <span>${n.updated_at || n.created_at}</span></div>
      ${tagsHtml}
      <div class="note-content" data-note-id="${n.id}">${marked.parse(n.content)}</div>
      <div class="note-actions">
        <div style="flex:1"></div>
        <button class="note-expand-btn" data-note-id="${n.id}" onclick="toggleNoteExpand(${n.id})">▼ 展开</button>
        <div style="flex:1;display:flex;justify-content:flex-end;gap:6px">
          <button class="note-action-btn" onclick="showNoteEditor(${n.id})">✎ 编辑</button>
          <button class="note-action-btn danger" onclick="deleteNote(${n.id})">✕ 删除</button>
        </div>
      </div>
    </div>`;
  }).join('');

  renderNotesPagination(allSorted.length);
}

function renderNotesPagination(total) {
  let container = document.getElementById('notesPagination');
  if (!container) {
    container = document.createElement('div');
    container.id = 'notesPagination';
    container.className = 'notes-pagination';
    document.getElementById('notesList').after(container);
  }
  if (total <= notesPageSize) { container.innerHTML = ''; return; }
  const totalPages = Math.ceil(total / notesPageSize);
  container.innerHTML = `
    <button onclick="notesPage--;renderNotes()" ${notesPage <= 1 ? 'disabled' : ''}>上一页</button>
    <span class="page-info">${notesPage} / ${totalPages} 页（共 ${total} 条）</span>
    <button onclick="notesPage++;renderNotes()" ${notesPage >= totalPages ? 'disabled' : ''}>下一页</button>
    <select onchange="notesPageSize=Number(this.value);notesPage=1;renderNotes()">
      <option value="10" ${notesPageSize===10?'selected':''}>10条/页</option>
      <option value="20" ${notesPageSize===20?'selected':''}>20条/页</option>
      <option value="50" ${notesPageSize===50?'selected':''}>50条/页</option>
    </select>`;
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function showNoteEditor(id) {
  editingNoteId = id || null;
  const modal = document.getElementById('noteEditorModal');
  const titleEl = document.getElementById('noteEditorTitle');
  const titleInput = document.getElementById('noteEditorNoteTitle');
  const textarea = document.getElementById('noteEditorContent');
  if (editingNoteId) {
    titleEl.textContent = '📝 编辑笔记';
    const note = notes.find(n => n.id === editingNoteId);
    titleInput.value = note ? (note.title || '') : '';
    textarea.value = note ? note.content : '';
    editingNoteTags = note ? [...(note.tags || [])] : [];
  } else {
    titleEl.textContent = '📝 新增笔记';
    titleInput.value = '';
    textarea.value = '';
    editingNoteTags = [];
  }
  renderEditorTags();
  updateNotePreview();
  modal.style.display = '';
  modal.classList.add('show');
  setTimeout(() => textarea.focus(), 50);
}

function renderEditorTags() {
  const container = document.getElementById('noteEditorTagPills');
  container.innerHTML = editingNoteTags.map((t, i) =>
    `<span class="editor-tag-pill">${escHtml(t)}<span class="editor-tag-remove" onclick="removeEditorTag(${i})">✕</span></span>`
  ).join('');
}

function handleEditorTagKey(e) {
  if (e.key === 'Enter' || e.key === ',') {
    e.preventDefault();
    const input = document.getElementById('noteEditorTagInput');
    const tag = input.value.replace(/,/g, '').trim();
    if (tag && !editingNoteTags.includes(tag)) {
      editingNoteTags.push(tag);
      renderEditorTags();
    }
    input.value = '';
  }
}

function removeEditorTag(index) {
  editingNoteTags.splice(index, 1);
  renderEditorTags();
}

function closeNoteEditor() {
  const modal = document.getElementById('noteEditorModal');
  modal.classList.remove('show');
  setTimeout(() => { modal.style.display = 'none'; }, 200);
  editingNoteId = null;
  editingNoteTags = [];
  switchNoteTab('edit');
}

async function saveNote() {
  const textarea = document.getElementById('noteEditorContent');
  const titleInput = document.getElementById('noteEditorNoteTitle');
  const content = textarea.value.trim();
  const title = titleInput.value.trim();
  if (!content) return;

  try {
    if (editingNoteId) {
      const updated = await api(`/api/notes/${editingNoteId}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title, content, tags: editingNoteTags }),
      });
      const idx = notes.findIndex(n => n.id === editingNoteId);
      if (idx !== -1) notes[idx] = updated;
    } else {
      const note = await api('/api/notes', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title, content, source: 'manual', tags: editingNoteTags }),
      });
      notes.push(note);
    }
    closeNoteEditor();
    renderNotes();
  } catch (e) {
    alert('保存失败：' + e.message);
  }
}

async function deleteNote(id) {
  if (!confirm('确定删除这条笔记吗？')) return;
  try {
    await api(`/api/notes/${id}`, { method: 'DELETE' });
    notes = notes.filter(n => n.id !== id);
    renderNotes();
  } catch (e) {
    alert('删除失败：' + e.message);
  }
}

function switchNoteTab(tab) {
  const ta = document.getElementById('noteEditorContent');
  const pv = document.getElementById('noteEditorPreview');
  const btnEdit = document.getElementById('noteTabEdit');
  const btnPv = document.getElementById('noteTabPreview');
  if (tab === 'preview') {
    ta.style.display = 'none';
    pv.style.display = '';
    btnEdit.classList.remove('active');
    btnPv.classList.add('active');
    updateNotePreview();
  } else {
    ta.style.display = '';
    pv.style.display = 'none';
    btnEdit.classList.add('active');
    btnPv.classList.remove('active');
  }
}

function updateNotePreview() {
  const textarea = document.getElementById('noteEditorContent');
  const preview = document.getElementById('noteEditorPreview');
  if (!textarea || !preview) return;
  const val = textarea.value.trim();
  preview.innerHTML = val ? marked.parse(val) : '<span style="color:#c4b0a0">预览区域…</span>';
}

function insertMd(type) {
  const ta = document.getElementById('noteEditorContent');
  const start = ta.selectionStart;
  const end = ta.selectionEnd;
  const sel = ta.value.substring(start, end);
  let before = '', after = '', newCursorOffset = 0;

  switch (type) {
    case 'bold':
      before = '**'; after = '**'; break;
    case 'italic':
      before = '*'; after = '*'; break;
    case 'h1':
      before = '# '; after = ''; break;
    case 'h2':
      before = '## '; after = ''; break;
    case 'h3':
      before = '### '; after = ''; break;
    case 'ul':
      before = '- '; after = ''; break;
    case 'ol':
      before = '1. '; after = ''; break;
    case 'quote':
      before = '> '; after = ''; break;
    case 'hr':
      before = '\n---\n'; after = ''; break;
    case 'code':
      before = '`'; after = '`'; break;
  }

  const newText = before + sel + after;
  ta.value = ta.value.substring(0, start) + newText + ta.value.substring(end);
  ta.selectionStart = ta.selectionEnd = start + before.length + sel.length + after.length;
  ta.focus();
  updateNotePreview();
}

// ── 选区收藏到笔记 ──────────────────────────────────────

let collectSelectedText = '';

// 用 mouseup + 定时器检测选区（兼容各浏览器）
document.addEventListener('mouseup', function(e) {
  // 点击浮动按钮或面板内部时不重新检测，避免面板刚弹出就被隐藏
  const floatBtn = document.getElementById('collectFloatBtn');
  const panel = document.getElementById('collectPanel');
  if (floatBtn.contains(e.target) || panel.contains(e.target)) return;
  setTimeout(checkChatSelection, 50);
});

// 触摸设备支持
document.addEventListener('touchend', function() {
  setTimeout(checkChatSelection, 100);
});

function checkChatSelection() {
  const floatBtn = document.getElementById('collectFloatBtn');
  const panel = document.getElementById('collectPanel');
  panel.style.display = 'none';

  const sel = window.getSelection();
  const text = sel ? sel.toString().trim() : '';
  if (!text) { floatBtn.style.display = 'none'; return; }

  const chatBody = document.getElementById('aiChatBody');
  if (!chatBody) return;

  try {
    const range = sel.getRangeAt(0);
    if (!chatBody.contains(range.commonAncestorContainer)) {
      floatBtn.style.display = 'none';
      return;
    }
    collectSelectedText = text;
    const rect = range.getBoundingClientRect();
    floatBtn.style.display = 'block';
    floatBtn.style.left = Math.max(4, rect.left + rect.width / 2 - 60) + 'px';
    floatBtn.style.top = Math.max(4, rect.top - 38) + 'px';
  } catch {
    floatBtn.style.display = 'none';
  }
}

// 点击浮动按钮 → 打开选择面板
document.getElementById('collectFloatBtn').addEventListener('click', function() {
  const btnRect = this.getBoundingClientRect();
  this.style.display = 'none';
  const panel = document.getElementById('collectPanel');
  const listEl = document.getElementById('collectNoteList');

  const sorted = [...notes].reverse().slice(0, 10);
  listEl.innerHTML = sorted.map(n => {
    const label = n.title || n.content.substring(0, 20).replace(/\n/g, ' ');
    const sub = n.updated_at || n.created_at;
    return `<div class="collect-panel-item" onclick="collectToExistingNote(${n.id})">
      ${escHtml(label)}
      <div class="item-sub">${sub}</div>
    </div>`;
  }).join('');

  let top = btnRect.bottom + 4;
  let left = btnRect.left;
  if (left + 260 > window.innerWidth) left = window.innerWidth - 270;
  if (top + 320 > window.innerHeight) top = btnRect.top - 320;
  panel.style.left = left + 'px';
  panel.style.top = top + 'px';
  panel.style.display = 'block';
});

// 新建笔记
async function collectToNewNote() {
  if (!collectSelectedText) return;
  document.getElementById('collectPanel').style.display = 'none';
  try {
    const note = await api('/api/notes', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ content: collectSelectedText, source: 'ai-chat' }),
    });
    notes.push(note);
    collectSelectedText = '';
    showToast('已新建笔记');
  } catch (e) {
    alert('收藏失败：' + e.message);
  }
}

// 追加到已有笔记
async function collectToExistingNote(noteId) {
  if (!collectSelectedText) return;
  document.getElementById('collectPanel').style.display = 'none';
  const note = notes.find(n => n.id === noteId);
  if (!note) return;
  try {
    const newContent = note.content + '\n\n' + collectSelectedText;
    const updated = await api(`/api/notes/${noteId}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ title: note.title || '', content: newContent }),
    });
    const idx = notes.findIndex(n => n.id === noteId);
    if (idx !== -1) notes[idx] = updated;
    collectSelectedText = '';
    showToast('已追加到笔记');
  } catch (e) {
    alert('收藏失败：' + e.message);
  }
}

function showToast(msg) {
  let toast = document.getElementById('toast');
  if (!toast) {
    toast = document.createElement('div');
    toast.id = 'toast';
    toast.className = 'toast';
    document.body.appendChild(toast);
  }
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2000);
}

// ── 窗口最大化/还原 ──────────────────────────────────────────

function toggleChatMaximize() {
  const panel = document.getElementById('aiChatPanel');
  const btn = document.getElementById('aiChatMaxBtn');
  if (panel.dataset.maximized === 'true') {
    // 还原
    panel.style.width = panel.dataset.prevWidth;
    panel.style.height = panel.dataset.prevHeight;
    panel.dataset.maximized = 'false';
    btn.textContent = '⤢';
  } else {
    // 最大化：保存当前尺寸
    panel.dataset.prevWidth = panel.style.width || '';
    panel.dataset.prevHeight = panel.style.height || '';
    panel.style.width = '50vw';
    panel.style.height = '70vh';
    panel.dataset.maximized = 'true';
    btn.textContent = '⤡';
  }
}

// 页面加载后初始化
initResizeHandle();
initResizeHandleTop();

// 页面加载时从后端获取数据
loadTeas();
