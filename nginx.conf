server {
    listen 80;
    server_name _;

    # Redirect HTTP to HTTPS (uncomment when TLS is configured)
    # return 301 https://$host$request_uri;

    # Frontend static files (Vite build output)
    location / {
        proxy_pass http://app:5001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API proxy
    location /api/ {
        proxy_pass http://app:5001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE support — HTTP/1.1 is critical, default 1.0 doesn't support chunked streaming
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        chunked_transfer_encoding on;
    }

    # Photos (direct file serving when STORAGE_TYPE=local)
    location /data/photos/ {
        alias /app/data/photos/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Static assets from frontend build
    location /assets/ {
        proxy_pass http://app:5001;
        proxy_set_header Host $host;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    client_max_body_size 200m;
}

